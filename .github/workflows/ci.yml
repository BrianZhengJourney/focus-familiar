name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swiftc --version

      - name: Build Mimo.app
        run: mac/build.sh

      - name: Run unit tests
        run: mac/test.sh

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Focus Familiar overlay</title>
<style>
/* ── transparent overlay: the creature lives bottom-right ── */
:root{
  --font-ui: -apple-system, 'Inter', sans-serif;
  --font-magic: 'Fraunces', Georgia, serif;
  --font-mono: 'SF Mono', Menlo, monospace;
  --ink:#e9e6f7; --ink-dim:#9d97b8;
  --fam-glow: rgba(146,120,255,.45);
  /* wisp dynamic palette */
  --fam-hi:#cabcf5; --fam-lo:#7e68dc; --wisp:#b9a5ff;
  --eye-col:#2d2350; --mouth-col:#2d2350;
  --tint: transparent;
}
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ width:100%; height:100%; background:transparent; overflow:hidden; }
body{ font-family:var(--font-ui); -webkit-user-select:none; }

.stage{ position:absolute; right:10px; bottom:6px; width:150px; }

/* ── creature container ── */
.familiar{ position:relative; width:150px; height:150px;
  animation:bob 3.6s ease-in-out infinite; transition:filter .6s, opacity .6s; }
@keyframes bob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-8px);} }
.familiar svg{ width:100%; height:100%; overflow:visible; display:none; }
.familiar svg.cur{ display:block; }

.aura{ position:absolute; inset:-14px; border-radius:50%; pointer-events:none;
  background:radial-gradient(circle, var(--fam-glow) 0%, transparent 66%);
  transition:opacity .8s, transform .8s; opacity:.75; }
.ring{ position:absolute; inset:8px; border-radius:50%; border:2px solid #ffd76a; opacity:0; pointer-events:none; }
.ring.burst{ animation:ringBurst 1.1s ease-out forwards; }
@keyframes ringBurst{ 0%{ transform:scale(.4); opacity:.95;} 100%{ transform:scale(2.4); opacity:0;} }
.shadow{ position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
  width:70px; height:12px; border-radius:50%; background:#000; opacity:.28; filter:blur(4px); }

/* svg shared bits */
.grad-hi{ stop-color:var(--fam-hi); } .grad-lo{ stop-color:var(--fam-lo); }
.eye{ fill:var(--eye-col); } .eye-shine{ fill:#fff; opacity:.9; }
.eye-arc{ stroke:var(--eye-col); stroke-width:3; fill:none; stroke-linecap:round; }
.eye-swirl{ stroke:var(--eye-col); stroke-width:2; fill:none; stroke-linecap:round; }
.eye-x{ stroke:var(--eye-col); stroke-width:2.6; stroke-linecap:round; }
.eye-lid{ stroke:var(--eye-col); stroke-width:3; stroke-linecap:round; }
.mouth{ stroke:var(--mouth-col); stroke-width:2.4; fill:none; stroke-linecap:round; }
.mouth-open{ fill:var(--mouth-col); stroke:none; }
.eyes,.mouth{ opacity:0; transition:opacity .25s; }
[data-fam-face="open"]   .eyes-open,   [data-fam-face="open"]   .mouth-smile{ opacity:1; }
[data-fam-face="happy"]  .eyes-happy,  [data-fam-face="happy"]  .mouth-open{ opacity:1; }
[data-fam-face="spiral"] .eyes-spiral, [data-fam-face="spiral"] .mouth-wavy{ opacity:1; }
[data-fam-face="dead"]   .eyes-dead,   [data-fam-face="dead"]   .mouth-wavy{ opacity:1; }
[data-fam-face="low"]    .eyes-low,    [data-fam-face="low"]    .mouth-o{ opacity:1; }
.crown{ opacity:0; transform:translateY(6px); transition:opacity .7s, transform .7s; }
.crown path{ fill:#ffd76a; stroke:#e0a92f; stroke-width:1; }
.tint{ fill:var(--tint); transition:fill .8s; pointer-events:none; }
.drips{ opacity:0; transition:opacity .6s; }
.drip{ fill:#4e8a2a; }
.d1{ animation:dripFall 2.1s ease-in infinite; } .d2{ animation:dripFall 2.7s .6s ease-in infinite; } .d3{ animation:dripFall 2.4s 1.1s ease-in infinite; }
@keyframes dripFall{ 0%{ transform:translateY(0); opacity:.9;} 100%{ transform:translateY(14px); opacity:0;} }
.wisp-flame{ fill:var(--wisp); animation:wispFlick 1.6s ease-in-out infinite; transform-origin:60px 14px; }
@keyframes wispFlick{ 0%,100%{ transform:scaleY(1);} 40%{ transform:scaleY(1.25) skewX(3deg);} 70%{ transform:scaleY(.92) skewX(-3deg);} }
.atom-orbit{ animation:orbitSpin 5s linear infinite; transform-origin:60px 60px; }
@keyframes orbitSpin{ to{ transform:rotate(360deg);} }
.atom-rune{ animation:runeFloat 3.4s ease-in-out infinite; }
.atom-rune.r2{ animation-delay:1.2s; }
@keyframes runeFloat{ 0%,100%{ opacity:.25; transform:translateY(0);} 50%{ opacity:.85; transform:translateY(-5px);} }

/* character palettes */
.char-wisp   { --eye-col:#2d2350; --mouth-col:#2d2350; }
.char-robocat{ --eye-col:#1c2530; --mouth-col:#1c2530; }
.char-panda  { --eye-col:#ffffff; --mouth-col:#2a2a30; }
.char-atom   { --eye-col:#a9e4ff; --mouth-col:#a9e4ff; }
.char-beaver { --eye-col:#2b1a0e; --mouth-col:#2b1a0e; }
.char-atom .eye-shine{ opacity:.5; }
.char-atom .eye, .char-atom .eye-arc, .char-atom .eye-swirl, .char-atom .eye-x,
.char-atom .eye-lid, .char-atom .mouth{ filter:drop-shadow(0 0 3.5px #a9e4ffcc); }

/* ── state machine on the container ── */
[data-state="idle"]{ --fam-glow:rgba(146,120,255,.42); }
[data-state="focused"]{ --fam-glow:rgba(64,224,178,.5);
  --fam-hi:#a9f2dc; --fam-lo:#2fae8f; --wisp:#7df0cf; }
[data-state="scholar"]{ --fam-glow:rgba(110,140,255,.5);
  --fam-hi:#bcd0ff; --fam-lo:#5271d8; --wisp:#9db8ff; }
[data-state="dizzy"]{ --fam-glow:rgba(210,215,90,.4); --tint:rgba(215,215,80,.16);
  --fam-hi:#e6e88f; --fam-lo:#9aa23c; --wisp:#d9dd7a; }
[data-state="dizzy"] .familiar{ animation:wobble 1s ease-in-out infinite; }
@keyframes wobble{ 0%,100%{ transform:rotate(-4deg);} 50%{ transform:rotate(4deg) translateY(-3px);} }
[data-state="poisoned"]{ --fam-glow:rgba(130,200,60,.45); --tint:rgba(110,190,40,.30);
  --fam-hi:#b7e36a; --fam-lo:#4e8a2a; --wisp:#9ed455; }
[data-state="poisoned"] .familiar{ animation:queasy 2.2s ease-in-out infinite; }
[data-state="poisoned"] .drips{ opacity:1; }
@keyframes queasy{ 0%,100%{ transform:translateY(0) scale(1,1);} 50%{ transform:translateY(3px) scale(1.04,.94);} }
[data-state="ghost"]{ --fam-glow:rgba(160,170,210,.25);
  --fam-hi:#cfd4e8; --fam-lo:#6b7398; --wisp:#aab2d0; }
[data-state="ghost"] .familiar{ opacity:.5; filter:saturate(.25) blur(.4px); animation:ghostDrift 4s ease-in-out infinite; }
@keyframes ghostDrift{ 0%,100%{ transform:translateY(0);} 33%{ transform:translateY(-11px) translateX(-5px);} 66%{ transform:translateY(-3px) translateX(4px);} }
[data-state="evolved"]{ --fam-glow:rgba(255,196,90,.6);
  --fam-hi:#ffe9b0; --fam-lo:#f0a832; --wisp:#ffd76a; }
[data-state="evolved"] .crown{ opacity:1; transform:translateY(0); }
[data-state="evolved"] .aura{ transform:scale(1.2); opacity:1; }

.spark{ position:absolute; width:7px; height:7px; pointer-events:none;
  background:radial-gradient(circle,#fff 0 30%, var(--fam-glow) 70%, transparent);
  border-radius:50%; animation:sparkUp 1.4s ease-out forwards; }
@keyframes sparkUp{ 0%{ transform:translateY(0) scale(.6); opacity:0;} 20%{ opacity:1;} 100%{ transform:translateY(-46px) scale(1.15); opacity:0;} }

/* ── persistent focus-status badge: the plain-words "meat" ── */
.status-badge{ position:absolute; right:0; bottom:158px; display:flex; align-items:center; gap:6px;
  padding:4px 11px 4px 9px; border-radius:20px; background:rgba(20,16,40,.85); border:1px solid #ffffff1c;
  color:var(--ink); font-size:11.5px; font-weight:500; backdrop-filter:blur(8px); box-shadow:0 4px 14px #0006;
  white-space:nowrap; transition:border-color .4s; }
.sb-dot{ width:7px; height:7px; border-radius:50%; background:#8890a8; box-shadow:0 0 6px #8890a8;
  transition:background .4s, box-shadow .4s; }
.status-badge.focus{ border-color:#3fe0b255; }
.status-badge.focus .sb-dot{ background:#3fe0b2; box-shadow:0 0 7px #3fe0b2cc; }
.status-badge.distract{ border-color:#e0574d55; }
.status-badge.distract .sb-dot{ background:#e0574d; box-shadow:0 0 7px #e0574dcc; }

/* ── HUD above creature ── */
.hud{ position:absolute; right:0; bottom:192px; display:flex; flex-direction:column;
  gap:6px; align-items:flex-end; font-size:11px; color:var(--ink-dim);
  opacity:0; transform:translateY(4px); transition:opacity .5s, transform .5s; }
.hud.on{ opacity:1; transform:none; }
.hud-row{ display:flex; gap:6px; }
.chip{ display:flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px;
  background:rgba(20,16,40,.82); border:1px solid #ffffff1a; color:var(--ink);
  font-size:11px; backdrop-filter:blur(8px); box-shadow:0 4px 14px #0006; }
.chip b{ font-weight:600; font-variant-numeric:tabular-nums; }
.chip.streak b{ color:#7df0cf; }
.chip.pop{ animation:chipPop .45s cubic-bezier(.34,1.56,.64,1); }
@keyframes chipPop{ 50%{ transform:scale(1.2);} }
.flamebar{ width:64px; height:5px; border-radius:3px; background:#ffffff20; overflow:hidden; }
.flamefill{ height:100%; width:55%; border-radius:3px; transition:width .8s, background .8s;
  background:linear-gradient(90deg,#ff9d4d,#ffd76a); }
.flamefill.low{ background:linear-gradient(90deg,#5a5470,#7a7490); }

/* ── speech bubble (context restore) ── */
.bubble{ position:absolute; right:150px; bottom:20px; width:300px; opacity:0;
  transform:translateY(10px) scale(.96); transform-origin:bottom right;
  transition:opacity .4s, transform .4s cubic-bezier(.34,1.4,.64,1); pointer-events:none; }
.bubble.on{ opacity:1; transform:none; pointer-events:auto; }
.bubble-inner{ background:rgba(24,19,46,.94); backdrop-filter:blur(20px);
  border:1px solid rgba(185,165,255,.3); border-radius:15px; padding:13px 15px;
  color:var(--ink); font-size:12.5px; line-height:1.55;
  box-shadow:0 16px 44px rgba(0,0,0,.5), 0 0 26px var(--fam-glow); }
.bubble-tail{ position:absolute; right:-7px; bottom:24px; width:13px; height:13px;
  background:rgba(24,19,46,.94); border-right:1px solid rgba(185,165,255,.3);
  border-top:1px solid rgba(185,165,255,.3); transform:rotate(45deg); }
.bb-head{ font-family:var(--font-magic); font-size:13px; color:#cabcf5; margin-bottom:7px; }
.bb-line{ margin:4px 0; }
.bb-line b{ color:#fff; }
.bb-dim{ color:var(--ink-dim); font-size:11.5px; }
.bb-mono{ font-family:var(--font-mono); font-size:10.5px; background:#ffffff10; padding:1px 5px; border-radius:4px; color:#9ef0b0; }
.bb-btn{ font-family:inherit; font-size:11.5px; padding:5px 10px; margin-top:8px; margin-right:6px;
  border-radius:8px; color:#e9e6f7; background:#7e68dc33; border:1px solid #7e68dc66; cursor:pointer; }
.bb-btn:hover{ background:#7e68dc55; }
.bb-cols{ display:flex; gap:8px; margin:8px 0; }
.bb-col{ flex:1; background:#ffffff08; border:1px solid #ffffff10; border-radius:10px; padding:7px 10px; }
.bb-col .k{ font-size:10px; color:var(--ink-dim); letter-spacing:.03em; }
.bb-col .pct{ font-family:var(--font-magic); font-size:19px; margin:1px 0 2px; }
.bb-col .pct.good{ color:#7df0cf; } .bb-col .pct.mid{ color:#ffd479; } .bb-col .pct.bad{ color:#e88fae; }
.bb-col .sub{ font-size:10.5px; color:var(--ink-dim); }
.bb-sec{ margin-top:8px; }
.bb-sec .sh{ font-size:10.5px; color:#cabcf5; letter-spacing:.03em; margin-bottom:3px; }
.bb-item{ font-size:11.5px; color:var(--ink); padding:1.5px 0; white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; max-width:100%; }
.bb-item .t{ color:var(--ink-dim); font-size:10.5px; margin-left:5px; }

/* ── journal: full openable history, bucketed by time ── */
.journal{ position:absolute; right:150px; bottom:10px; width:334px; max-height:300px;
  display:none; flex-direction:column; border-radius:15px; overflow:hidden;
  background:rgba(24,19,46,.95); backdrop-filter:blur(20px);
  border:1px solid rgba(185,165,255,.3);
  box-shadow:0 16px 44px rgba(0,0,0,.5), 0 0 26px var(--fam-glow);
  color:var(--ink); font-size:12px; }
.journal.on{ display:flex; }
.j-head{ display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px 8px; font-family:var(--font-magic); font-size:13.5px; color:#cabcf5;
  border-bottom:1px solid #ffffff12; flex:none; }
.j-close{ font-family:inherit; font-size:11px; color:var(--ink-dim); background:none;
  border:none; cursor:pointer; padding:2px 4px; }
.j-close:hover{ color:var(--ink); }
.j-tabs{ display:flex; gap:5px; padding:8px 14px 2px; flex:none; }
.j-tab{ font-family:inherit; font-size:10.5px; color:var(--ink-dim); background:#ffffff0a;
  border:1px solid #ffffff14; border-radius:14px; padding:3px 10px; cursor:pointer; }
.j-tab:hover{ color:var(--ink); }
.j-tab.cur{ color:#14102b; background:#cabcf5; border-color:#cabcf5; font-weight:600; }
.j-body{ overflow-y:auto; min-height:0; overscroll-behavior:contain; padding:8px 14px 12px; }
.j-bucket{ margin-bottom:10px; }
.j-bh{ font-size:10px; color:var(--ink-dim); letter-spacing:.06em; text-transform:uppercase;
  margin-bottom:4px; padding-bottom:2px; border-bottom:1px dashed #ffffff14; }
.j-sh{ cursor:pointer; user-select:none; }
.j-sh .arr{ display:inline-block; transition:transform .2s; font-size:9px; margin-right:2px; }
.j-sh.open .arr{ transform:rotate(90deg); }
.j-more{ font-size:10.5px; color:var(--ink-dim); cursor:pointer; padding:2px 0;
  text-decoration:underline; text-underline-offset:2px; }
.j-more:hover{ color:var(--ink); }
.j-total{ font-size:10.5px; color:var(--ink-dim); margin-left:6px; font-weight:400; }
.j-sec{ margin:4px 0 2px; }
.j-sh{ font-size:10.5px; color:#cabcf5; margin-bottom:2px; }
.j-sh.bad{ color:#e88fae; }
.j-item{ display:flex; gap:6px; align-items:baseline; padding:1.5px 0; }
.j-item .lbl{ flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.j-item .min{ color:var(--ink-dim); font-size:10.5px; flex:none; font-variant-numeric:tabular-nums; }
.j-empty{ color:var(--ink-dim); font-size:11.5px; padding:6px 0; }
/* stacked focus bar + chronological strip */
.j-bar{ display:flex; height:8px; border-radius:4px; overflow:hidden; margin:6px 0 3px; background:#ffffff10; }
.j-bar i{ display:block; height:100%; }
.j-bar .deep{ background:linear-gradient(90deg,#2fae8f,#7df0cf); }
.j-bar .neut{ background:#5a5470; }
.j-bar .dist{ background:linear-gradient(90deg,#c14a6a,#e88fae); }
.j-legend{ display:flex; gap:10px; font-size:9.5px; color:var(--ink-dim); margin-bottom:4px; }
.j-legend b{ font-weight:600; }
.j-legend .ld{ color:#7df0cf; } .j-legend .ln{ color:#8f8aa8; } .j-legend .lx{ color:#e88fae; }
.j-note{ font-family:var(--font-magic); font-size:12px; color:#cabcf5; margin:2px 0 8px; }
.j-strip{ display:flex; height:16px; border-radius:4px; overflow:hidden; margin:2px 0 10px; background:#ffffff08; }
.j-strip i{ display:block; height:100%; min-width:1px; font-style:normal; overflow:hidden; }
.j-strip i span{ display:block; font-size:8.5px; line-height:16px; color:rgba(255,255,255,.95);
  padding:0 4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  text-shadow:0 1px 2px rgba(0,0,0,.55); pointer-events:none; }
.j-strip .deep{ background:#2fae8f; } .j-strip .neut{ background:#3d3a52; } .j-strip .dist{ background:#c14a6a; }
.j-strip i:hover{ filter:brightness(1.25); }
.j-strip-cap{ display:flex; justify-content:space-between; font-size:9px; color:var(--ink-dim); margin:-7px 0 8px; }
.j-tip{ position:fixed; z-index:999; pointer-events:none; opacity:0; transition:opacity .12s;
  background:rgba(14,11,28,.96); border:1px solid rgba(185,165,255,.35); border-radius:8px;
  padding:5px 9px; font-size:10.5px; color:var(--ink); max-width:260px; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis; box-shadow:0 6px 20px #000a; }

/* toast */
.toast{ position:absolute; right:150px; bottom:96px; padding:8px 16px; border-radius:12px;
  font-family:var(--font-magic); font-size:13px; color:#ffe9b0; white-space:nowrap;
  background:rgba(28,20,50,.92); border:1px solid #ffd76a55; backdrop-filter:blur(12px);
  box-shadow:0 8px 30px #0007; opacity:0; transform:translateY(6px);
  transition:opacity .5s, transform .5s; pointer-events:none; }
.toast.on{ opacity:1; transform:none; }
</style>
</head>
<body data-state="idle" data-fam-face="open">

<div class="stage" id="stage">
  <div class="status-badge" id="statusBadge"><span class="sb-dot"></span><span id="statusText">😐 idle</span></div>
  <div class="hud" id="hud">
    <div class="hud-row" id="resRow"></div>
    <div class="hud-row">
      <span class="chip">🔥 <span class="flamebar"><span class="flamefill" id="flame"></span></span></span>
      <span class="chip streak">◇ <b id="streak">0m</b></span>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="bubble" id="bubble">
    <div class="bubble-inner" id="bubbleInner"></div>
    <div class="bubble-tail"></div>
  </div>
  <div class="journal" id="journal">
    <div class="j-head">
      <span>✦ today's journal</span>
      <button class="j-close" onclick="famToggleJournal()">✕</button>
    </div>
    <div class="j-tabs" id="journalTabs"></div>
    <div class="j-body" id="journalBody"></div>
  </div>
  <div class="familiar" id="familiar"></div>
  <div class="shadow"></div>
</div>

<script>
/* ═══ character library ═══
   every character embeds the same face group markup so one
   state machine drives all of them. */

function faceMarkup(lx, rx, ey, my){
  const cx = (lx + rx) / 2;
  return `
    <g class="eyes eyes-open">
      <ellipse cx="${lx}" cy="${ey}" rx="5.6" ry="7"/>
      <ellipse cx="${rx}" cy="${ey}" rx="5.6" ry="7"/>
      <circle cx="${lx+1.8}" cy="${ey-2.4}" r="2" class="eye-shine"/>
      <circle cx="${rx+1.8}" cy="${ey-2.4}" r="2" class="eye-shine"/>
    </g>
    <g class="eyes eyes-happy">
      <path d="M${lx-6} ${ey+1} Q${lx} ${ey-6} ${lx+6} ${ey+1}" class="eye-arc"/>
      <path d="M${rx-6} ${ey+1} Q${rx} ${ey-6} ${rx+6} ${ey+1}" class="eye-arc"/>
    </g>
    <g class="eyes eyes-spiral">
      <path d="M${lx} ${ey} m4 0 a4 4 0 1 1 -4 -4 a2.6 2.6 0 1 1 -2.6 2.6" class="eye-swirl"/>
      <path d="M${rx} ${ey} m4 0 a4 4 0 1 1 -4 -4 a2.6 2.6 0 1 1 -2.6 2.6" class="eye-swirl"/>
    </g>
    <g class="eyes eyes-dead">
      <path d="M${lx-5} ${ey-5} L${lx+5} ${ey+5} M${lx+5} ${ey-5} L${lx-5} ${ey+5}" class="eye-x"/>
      <path d="M${rx-5} ${ey-5} L${rx+5} ${ey+5} M${rx+5} ${ey-5} L${rx-5} ${ey+5}" class="eye-x"/>
    </g>
    <g class="eyes eyes-low">
      <path d="M${lx-6} ${ey+2} L${lx+6} ${ey+2}" class="eye-lid"/>
      <path d="M${rx-6} ${ey+2} L${rx+6} ${ey+2}" class="eye-lid"/>
    </g>
    <path class="mouth mouth-smile" d="M${cx-6} ${my} Q${cx} ${my+5} ${cx+6} ${my}"/>
    <path class="mouth mouth-open"  d="M${cx-5} ${my-1} Q${cx} ${my+7} ${cx+5} ${my-1} Q${cx} ${my+2} ${cx-5} ${my-1} Z"/>
    <path class="mouth mouth-wavy"  d="M${cx-8} ${my+2} Q${cx-4} ${my-2} ${cx} ${my+2} Q${cx+4} ${my+6} ${cx+8} ${my+2}"/>
    <path class="mouth mouth-o"     d="M${cx} ${my+2} m-3.2 0 a3.2 3.2 0 1 0 6.4 0 a3.2 3.2 0 1 0 -6.4 0"/>
    <g class="crown"><path d="M${cx-14} 16 L${cx-10} 6 L${cx-3} 13 L${cx} 2 L${cx+3} 13 L${cx+10} 6 L${cx+14} 16 Q${cx} 11 ${cx-14} 16 Z"/></g>
    <g class="drips">
      <path class="drip d1" d="M${cx-16} 96 q-1.5 7 0 11 q1.5 -4 0 -11Z"/>
      <path class="drip d2" d="M${cx} 98 q-1.5 8 0 13 q1.5 -5 0 -13Z"/>
      <path class="drip d3" d="M${cx+17} 95 q-1.5 6 0 10 q1.5 -4 0 -10Z"/>
    </g>`;
}

const CHARACTERS = {
  wisp: { name: 'Wisp', body: `
    <defs><radialGradient id="wg" cx="42%" cy="34%" r="75%">

const Fam = {
  char: 'wisp', state: 'idle',
  focus: 55, streakStart: null, level: 1,
  resources: { protein:0, iron:0, spellbook:0, fragment:0 },
  history: [],          // {app, kind, t0, t1}
  cur: null,            // {app, kind, t0}
  distractSec: 0, deepSec: 0, switches: [],
  paused: false,

  FACE: { idle:'open', focused:'happy', scholar:'open', dizzy:'spiral',
          poisoned:'dead', ghost:'low', evolved:'happy' },

  setCharacter(id){
    if (!CHARACTERS[id]) return;
    this.char = id;
    const holder = document.getElementById('familiar');
    holder.innerHTML = '';
    const c = CHARACTERS[id];
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 120 120');
    svg.classList.add('cur');
    svg.innerHTML = c.body + faceMarkup(...c.face);
    holder.appendChild(svg);
    holder.className = 'familiar char-' + id;
    localStorage.setItem('ff-char', id);
  },

  STATUS: {
    idle:     { cls: '',         label: '😐 idle' },
    focused:  { cls: 'focus',    label: '🎯 focusing' },
    scholar:  { cls: 'focus',    label: '📖 focusing — reading' },
    evolved:  { cls: 'focus',    label: '✦ focusing — on a streak' },
    dizzy:    { cls: 'distract', label: '🌀 getting distracted' },
    poisoned: { cls: 'distract', label: '☠️ distracted' },
    ghost:    { cls: 'distract', label: '👻 very distracted' },
  },

  setState(s){
    if (this.state === s) return;
    this.state = s;
    document.body.dataset.state = s;
    document.body.dataset.famFace = this.FACE[s] || 'open';
    const st = this.STATUS[s] || this.STATUS.idle;
    document.getElementById('statusBadge').className =
      'status-badge' + (st.cls ? ' ' + st.cls : '');
    document.getElementById('statusText').textContent = st.label;
  },

  setFocus(v){
    this.focus = Math.max(0, Math.min(100, v));
    const f = document.getElementById('flame');
    f.style.width = this.focus + '%';
    f.classList.toggle('low', this.focus < 30);
  },

  streakMin(){ return this.streakStart ? Math.floor((Date.now() - this.streakStart) / 60000) : 0; },
  renderStreak(){ document.getElementById('streak').textContent = this.streakMin() + 'm'; },

  renderRes(){
    const icons = { protein:'🥩', iron:'⛓️', spellbook:'📖', fragment:'🔮' };
    document.getElementById('resRow').innerHTML = Object.entries(this.resources)
      .filter(([,v]) => v > 0)
      .map(([k,v]) => `<span class="chip" data-res="${k}">${icons[k]} <b>${v}</b></span>`).join('');
  },

  gain(key){
    this.resources[key]++;
    this.renderRes();
    const chip = document.querySelector(`.chip[data-res="${key}"]`);
    chip && chip.classList.add('pop');
    chip && setTimeout(() => chip.classList.remove('pop'), 500);
    this.sparkle(3);
  },

  sparkle(n){
    const st = document.getElementById('stage');
    for (let i = 0; i < n; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      s.style.right = (20 + Math.random() * 90) + 'px';
      s.style.bottom = (60 + Math.random() * 60) + 'px';
      s.style.animationDelay = (Math.random() * .35) + 's';
      st.appendChild(s);
      setTimeout(() => s.remove(), 1900);
    }
  },

    this.level++;
    const ring = document.getElementById('ring') || (() => {
      const r = document.createElement('div'); r.className = 'ring'; r.id = 'ring';
      document.getElementById('stage').appendChild(r); return r;
    })();
    ring.classList.remove('burst'); void ring.offsetWidth; ring.classList.add('burst');
    this.setState('evolved');
    this.sparkle(9);
    toast(`✦ evolved — lv.${this.level} ✦`);
    setTimeout(() => { if (this.state === 'evolved') this.setState('focused'); }, 8000);
  },

  hud(on){ document.getElementById('hud').classList.toggle('on', on); },
};

let _toastT;

  const t = document.getElementById('toast');

/* ═══ focus engine — real-time-ish, slightly accelerated ═══ */
const RESOURCE_FOR = k => ({ code:'protein', term:'iron', cad:'iron', paper:'spellbook', notes:'fragment' }[k] || 'protein');

setInterval(() => {
  if (Fam.paused || !Fam.cur) return;
  const kind = Fam.cur.kind;
  if (DEEP_KINDS.has(kind)) {
    Fam.deepSec++; Fam.distractSec = Math.max(0, Fam.distractSec - 2);
    Fam.setFocus(Fam.focus + 0.25);
    if (!Fam.streakStart) Fam.streakStart = Date.now();
    if (Fam.deepSec === 6) Fam.setState(kind === 'paper' ? 'scholar' : 'focused');
    if (Fam.deepSec > 0 && Fam.deepSec % 45 === 0) Fam.gain(RESOURCE_FOR(kind));
    const m = Fam.streakMin();
    if (m === 25 && !Fam._t25) { Fam._t25 = true; toast('🔥 25-minute streak'); }
    if (m === 50 && Fam.level === 1) Fam.levelUp();
  } else if (kind === 'distraction') {
    Fam.distractSec++; Fam.deepSec = 0; Fam.streakStart = null; Fam._t25 = false;
    Fam.setFocus(Fam.focus - 0.5);
    if (Fam.distractSec === 8)  Fam.setState('dizzy');
    if (Fam.distractSec === 45) { Fam.setState('poisoned'); toast('☠️ poisoned by the feed'); }
    if (Fam.distractSec === 120) Fam.setState('ghost');
  } else {
    // neutral: corruption wears off, then settle to idle
    Fam.deepSec = 0;
    if (Fam.distractSec > 0) {
      Fam.distractSec--;
      if (Fam.distractSec <= 30 && ['poisoned','ghost'].includes(Fam.state)) Fam.setState('dizzy');
      if (Fam.distractSec === 0) Fam.setState('idle');
    } else if (Fam.state !== 'idle' && Fam.state !== 'evolved') {
      Fam.setState('idle');
    }
  }
  Fam.renderStreak();
}, 1000);

/* checkpoint: split long open sessions into ≤60s segments on disk, so a
   quit/crash loses at most a minute. aggregate() re-merges them by canonKey. */
setInterval(() => {
  if (!Fam.cur) return;
  const now = Date.now();
  if (now - Fam.cur.t0 < 60000) return;
  const seg = { ...Fam.cur, t1: now };
  Fam.history.push(seg);
  if (Fam.history.length > 600) Fam.history.shift();
  bridge({ type: 'log', entry: seg });
  Fam.cur.t0 = now;
}, 15000);

/* blink */
setInterval(() => {
  if (document.body.dataset.famFace !== 'open') return;
  document.body.dataset.famFace = 'low';
  setTimeout(() => {
    if (Fam.FACE[Fam.state] === 'open') document.body.dataset.famFace = 'open';
  }, 140);
}, 4600);

/* ═══ API called from Swift ═══ */
function famSetApp(appName, kind, detail, url, canon){
  const now = Date.now();
  if (Fam.cur) {
    Fam.cur.t1 = now;
    Fam.history.push(Fam.cur);
    if (Fam.history.length > 600) Fam.history.shift();
    if (Fam.cur.t1 - Fam.cur.t0 >= 5000) bridge({ type: 'log', entry: Fam.cur });  // persist to disk
  }
  Fam.cur = { app: appName, kind, detail: detail || '', url: url || '', canon: canon || '', t0: now };
  // frantic switching → ghost
  Fam.switches = Fam.switches.filter(t => now - t < 8000);
  Fam.switches.push(now);
  if (Fam.switches.length >= 5) { Fam.setState('ghost'); Fam.distractSec = Math.max(Fam.distractSec, 46); }
  Fam.hud(true);
  clearTimeout(Fam._hudT);
  Fam._hudT = setTimeout(() => Fam.hud(false), 6000);
}

function famSetCharacter(id){ Fam.setCharacter(id); toast(CHARACTERS[id].name); }
function famPause(p){ Fam.paused = p; Fam.setState(p ? 'idle' : Fam.state); }

/* user went idle / screen locked: close the open entry so away-time
   never counts as work. Swift re-sends the frontmost app on return. */
function famIdle(on){
  if (!on || !Fam.cur) return;
  const now = Date.now();
  Fam.cur.t1 = now;
  if (now - Fam.cur.t0 >= 5000) {
    Fam.history.push(Fam.cur);
    if (Fam.history.length > 600) Fam.history.shift();
    bridge({ type: 'log', entry: Fam.cur });
  }
  Fam.cur = null;
  Fam.deepSec = 0;
  Fam.streakStart = null;
  Fam.setState('idle');
  Fam.renderStreak();
}

/* called by Swift on launch with today's persisted entries (JSONL replay) */
function famLoadHistory(entries){
  if (!Array.isArray(entries)) return;
  Fam.history = entries.filter(e => e && e.t0 && e.t1).concat(Fam.history);
  if (Fam.history.length > 600) Fam.history = Fam.history.slice(-600);
}

function bridge(msg){
  try { window.webkit.messageHandlers.bridge.postMessage(msg); } catch(e) {}
}

function closeBubble(){
  document.getElementById('bubble').classList.remove('on');
  bridge({ type: 'bubble', on: false });
}

const DEEP_KINDS = new Set(['deep','code','term','cad','paper','notes']);

/* ── canonicalization: same thing under different names → one entry.
   heuristics for now; an on-device model can slot in at canonKey(). ── */
function normTitle(t){
  return (t || '')
    .replace(/\s*[-–—|·]\s*(YouTube|Google Docs|Google Chrome|GitHub|arXiv|Overleaf|Notion|Reddit|X)\s*$/i, '')
    .replace(/^\(\d+\)\s*/, '')            // "(3) title" notification counts
    .replace(/\.pdf$/i, '')
    .replace(/\s+/g, ' ').trim();
}
function canonKey(h){
  if (h.canon) return 'ai:' + h.canon.toLowerCase();   // on-device model's canonical name
  const arx = (h.url || '').match(/arxiv\.org\/(?:abs|pdf|html)\/(\d{4}\.\d{4,5})/i);
  if (arx) return 'arxiv:' + arx[1];       // 2606.10305 pdf == abs == html page
  const t = normTitle(h.detail);
  return t ? t.toLowerCase() : 'app:' + h.app;
}
function bestLabel(cur, cand){
  if (!cand) return cur;
  if (!cur) return cand;
  const numeric = s => /^[\d.\sv]+$/i.test(s);   // prefer "SARM2: …" over "2606.10305"
  if (numeric(cur) && !numeric(cand)) return cand;
  return cand.length > cur.length ? cand : cur;
}

/* best label per canonical key across ALL history, so a paper first seen
   as "2606.10305" upgrades everywhere once its real title is known */
function labelMap(){
  const m = {};
  for (const h of windowEntries()){
    const k = canonKey(h);
    m[k] = bestLabel(m[k], h.canon || normTitle(h.detail) || h.app);
  }
  return m;
}

/* aggregate history in [w0,w1] into read / built / distracted groups */
function aggregate(w0, w1, labels){
  const groups = {};
  for (const h of windowEntries()){
    const a = Math.max(h.t0, w0), b = Math.min(h.t1, w1);
    if (b - a < 20000) continue;           // ignore <20s touches
    const sec = h.kind === 'distraction' ? 'distracted'
              : h.kind === 'paper' ? 'read'
              : DEEP_KINDS.has(h.kind) ? 'built' : null;
    if (!sec) continue;
    const ck = canonKey(h);
    const key = sec + '|' + ck;
    const g = groups[key] || (groups[key] = { label: '', ms: 0, sec });
    g.ms += b - a;
    g.label = (labels && labels[ck]) || bestLabel(g.label, normTitle(h.detail) || h.app);
  }
  return Object.values(groups);
}

function windowEntries(){
  const now = Date.now();
  return Fam.cur ? [...Fam.history, {...Fam.cur, t1: now}] : [...Fam.history];
}

function windowStats(minutes){
  const now = Date.now(), w0 = now - minutes * 60000;
  let deep = 0, total = 0;
  for (const h of windowEntries()){
    const a = Math.max(h.t0, w0), b = Math.min(h.t1, now);
    if (b <= a) continue;
    total += b - a;
    if (DEEP_KINDS.has(h.kind)) deep += b - a;
  }
  return { pct: total ? Math.round(100 * deep / total) : 0, deepMin: Math.round(deep / 60000), total };
}

function pctCls(p){ return p >= 65 ? 'good' : p >= 35 ? 'mid' : 'bad'; }

function famToggleContext(){
  const b = document.getElementById('bubble');
  if (b.classList.contains('on')) { closeBubble(); return; }
  const fmt = ms => { const m = Math.round(ms/60000); return m >= 60 ? `${Math.floor(m/60)}h ${m%60}m` : `${m}m`; };
  const now = Date.now();
  const s25 = windowStats(25), s60 = windowStats(60);

  const curLine = Fam.cur
    ? `<div class="bb-line">You're in <b>${Fam.cur.app}</b> — ${fmt(now - Fam.cur.t0)} so far.</div>` : '';

  const col = (label, s) => s.total < 30000
    ? `<div class="bb-col"><div class="k">${label}</div><div class="sub" style="margin-top:6px">not enough data yet</div></div>`
    : `<div class="bb-col"><div class="k">${label}</div>
       <div class="pct ${pctCls(s.pct)}">${s.pct}%</div>
       <div class="sub">${s.deepMin}m deep work</div></div>`;

  // 📖 read: deep reading entries, deduped by canonical key so the same
  // paper under different titles collapses to its best-known name
  const labels = labelMap();
  const seenK = new Set();
  const read = windowEntries().reverse()
    .filter(h => h.kind === 'paper' && (h.detail || h.canon))
    .filter(h => { const k = canonKey(h); if (seenK.has(k)) return false; seenK.add(k); return true; })
    .slice(0, 3)
    .map(h => `<div class="bb-item">📖 ${labels[canonKey(h)] || normTitle(h.detail)}</div>`).join('');

  // 🛠️ built: deep tool time in the last hour, aggregated by app
  const w0 = now - 3600000, byApp = {};
  for (const h of windowEntries()){
    if (!DEEP_KINDS.has(h.kind) || h.kind === 'paper') continue;
    const a = Math.max(h.t0, w0), bb = Math.min(h.t1, now);
    if (bb > a) byApp[h.app] = (byApp[h.app] || 0) + (bb - a);
  }
  const built = Object.entries(byApp).sort((x, y) => y[1] - x[1]).slice(0, 3)
    .map(([app, ms]) => `<div class="bb-item">🛠️ ${app}<span class="t">${fmt(ms)}</span></div>`).join('');

  const streak = Fam.streakMin();
  document.getElementById('bubbleInner').innerHTML = `
    <div class="bb-head">✦ here's your thread</div>
    ${curLine}
    <div class="bb-cols">${col('LAST 25 MIN', s25)}${col('LAST HOUR', s60)}</div>
    ${buildStrip(now - 3600000, now, labels, { minLabelPct: 18 })}
    ${read ? `<div class="bb-sec"><div class="sh">READ</div>${read}</div>` : ''}
    ${built ? `<div class="bb-sec"><div class="sh">BUILT</div>${built}</div>` : ''}
    ${!read && !built ? '<div class="bb-line bb-dim">…still getting to know your rhythm. give me a few minutes.</div>' : ''}
    <div class="bb-line" style="margin-top:7px">${streak > 0 ? `focus streak: <b>${streak}m</b> 🔥` : 'no active streak — feed me.'}</div>
    <button class="bb-btn" onclick="closeBubble()">ok, back to work</button><button class="bb-btn" onclick="famToggleJournal()">full history ↗</button>`;
  document.getElementById('journal').classList.remove('on');
  b.classList.add('on');
  bridge({ type: 'bubble', on: true });
}

/* ── segment strip: merged per-activity bars with hover tooltips.
   consecutive checkpoints of the same thing fuse into one bar, so you
   see "Cursor · 20m" not twenty 1-minute stripes. ── */
const fmtDur = ms => {
  const m = Math.max(1, Math.round(ms / 60000));
  return m >= 60 ? `${Math.floor(m/60)}h ${m%60}m` : m + 'm';
};
const fmtClock = t => new Date(t).toTimeString().slice(0, 5);

function buildStrip(w0, now, labels, { minLabelPct = 12 } = {}){
  const segs = windowEntries()
    .map(x => ({ ...x, a: Math.max(x.t0, w0), b: Math.min(x.t1, now) }))
    .filter(x => x.b - x.a > 1000)
    .sort((x, y) => x.a - y.a);
  if (!segs.length) return '';
  const merged = [];
  for (const s of segs){
    const key = canonKey(s) + '|' + (DEEP_KINDS.has(s.kind) ? 'deep' : s.kind);
    const last = merged[merged.length - 1];
    if (last && last.key === key && s.a - last.b < 120000) last.b = Math.max(last.b, s.b);
    else merged.push({ a: s.a, b: s.b, key, kind: s.kind,
                       label: (labels && labels[canonKey(s)]) || normTitle(s.detail) || s.app });
  }
  const total = merged.reduce((acc, s) => acc + (s.b - s.a), 0);
  const inner = merged.map(s => {
    const pct = 100 * (s.b - s.a) / total;
    const cls = DEEP_KINDS.has(s.kind) ? 'deep' : s.kind === 'distraction' ? 'dist' : 'neut';
    const tip = `${s.label} — ${fmtDur(s.b - s.a)} · ${fmtClock(s.a)}–${fmtClock(s.b)}`;
    const inline = pct >= minLabelPct ? `<span>${s.label} · ${fmtDur(s.b - s.a)}</span>` : '';
    return `<i class="${cls}" style="width:${pct.toFixed(2)}%" data-tip="${tip.replace(/"/g, '&quot;')}">${inline}</i>`;
  }).join('');
  return `<div class="j-strip" onmousemove="stripTip(event)" onmouseleave="stripTip(null)">${inner}</div>
          <div class="j-strip-cap"><span>${fmtClock(merged[0].a)}</span><span>now</span></div>`;
}

function stripTip(e){
  let tip = document.getElementById('stripTip');
  if (!tip){
    tip = document.createElement('div');
    tip.id = 'stripTip'; tip.className = 'j-tip';
    document.body.appendChild(tip);
  }
  const t = e && e.target && e.target.dataset ? e.target.dataset.tip : null;
  if (!t){ tip.style.opacity = 0; return; }
  tip.textContent = t;
  tip.style.opacity = 1;
  tip.style.left = Math.max(4, Math.min(e.clientX + 10, innerWidth - 270)) + 'px';
  tip.style.top = Math.max(4, e.clientY - 32) + 'px';
}

const J_NOTES = [
  { min: 70, note: 'an honest stretch of work. i am well fed. ✦' },
  { min: 40, note: 'decent — the flame flickers, but holds.' },
  { min: 15, note: 'we wobble. close the feed and feed me instead.' },
  { min: 0,  note: 'we do not speak of this window. 🕳️' },
];

function renderJournal(){
  const now = Date.now();
  const w0 = now - J.tf * 60000;
  const fmtM = ms => {
    const m = Math.max(1, Math.round(ms / 60000));
    return m >= 60 ? `${Math.floor(m/60)}h ${m%60}m` : m + 'm';
  };
  document.getElementById('journalTabs').innerHTML = J_TIMEFRAMES.map(t =>
    `<button class="j-tab ${t.min === J.tf ? 'cur' : ''}" onclick="jSetTf(${t.min})">${t.label}</button>`).join('');

  const labels = labelMap();

  // clip entries to the window for the stacked deep/neutral/distraction bar
  const segs = windowEntries()
    .map(h => ({ ...h, a: Math.max(h.t0, w0), b: Math.min(h.t1, now) }))
    .filter(h => h.b - h.a > 1000);
  let deep = 0, dist = 0, neut = 0;
  for (const s of segs){
    const d = s.b - s.a;
    if (DEEP_KINDS.has(s.kind)) deep += d;
    else if (s.kind === 'distraction') dist += d;
    else neut += d;
  }
  const total = deep + dist + neut;
  let head = '';
  if (total > 30000){
    const pct = x => Math.round(100 * x / total);
    const note = J_NOTES.find(n => pct(deep) >= n.min).note;
    head = `
      <div class="j-bar">
        <i class="deep" style="width:${pct(deep)}%"></i>
        <i class="neut" style="width:${pct(neut)}%"></i>
        <i class="dist" style="width:${pct(dist)}%"></i>
      </div>
      <div class="j-legend">
        <span class="ld"><b>${pct(deep)}%</b> deep · ${fmtM(deep)}</span>
        <span class="ln"><b>${pct(neut)}%</b> neutral</span>
        <span class="lx"><b>${pct(dist)}%</b> distracted · ${fmtM(dist)}</span>
      </div>` +
      buildStrip(w0, now, labels) +
      `<div class="j-note">${note}</div>`;
  }

  const groups = aggregate(w0, now, labels);
  let html = head;
  for (const s of ['read', 'built', 'distracted']){
    const items = groups.filter(g => g.sec === s).sort((a, c) => c.ms - a.ms);
    if (!items.length) continue;
    const m = SEC_META[s];
    const total = fmtM(items.reduce((acc, g) => acc + g.ms, 0));
    const open = J.open[s];
    const shown = open ? items : items.slice(0, 3);
    html += `<div class="j-sec">
      <div class="j-sh ${m.cls} ${open ? 'open' : ''}" onclick="jToggleSec('${s}')">
        <span class="arr">▶</span>${m.icon} ${m.title}<span class="j-total">${total} · ${items.length}</span>
      </div>` +
      shown.map(g => `<div class="j-item"><span class="lbl">${g.label}</span><span class="min">${fmtM(g.ms)}</span></div>`).join('') +
      (!open && items.length > 3 ? `<div class="j-more" onclick="jToggleSec('${s}')">+ ${items.length - 3} more</div>` : '') +
      `</div>`;
  }
  document.getElementById('journalBody').innerHTML =
    html || `<div class="j-empty">the pages for this window are blank.<br>
      go build something, read something, break something —<br>i'll write it down. ✦</div>`;
}

function famToggleJournal(){
  const j = document.getElementById('journal');
  if (j.classList.contains('on')) {
    j.classList.remove('on');
    bridge({ type: 'bubble', on: false });
    return;
  }
  document.getElementById('bubble').classList.remove('on');
  renderJournal();
  j.classList.add('on');
  bridge({ type: 'bubble', on: true });
}

/* click creature → context bubble */
document.addEventListener('DOMContentLoaded', () => {
  Fam.setCharacter(localStorage.getItem('ff-char') || 'wisp');
  Fam.setFocus(55);

  // click = context bubble; press-and-move = drag (window moved by Swift);
  // in a plain browser (no bridge) click falls back to the bubble directly
  const fam = document.getElementById('familiar');
  const hasBridge = !!(window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.bridge);
  let pd = null, dragging = false;
  fam.addEventListener('pointerdown', e => {
    pd = { x: e.clientX, y: e.clientY }; dragging = false;
    fam.setPointerCapture(e.pointerId);
  });
  fam.addEventListener('pointermove', e => {
    if (!pd || dragging) return;
    if (Math.hypot(e.clientX - pd.x, e.clientY - pd.y) > 8) {
      dragging = true; bridge({ type: 'dragStart' });
    }
  });
  fam.addEventListener('pointerup', () => {
    if (dragging) bridge({ type: 'dragEnd' });
    else if (hasBridge) bridge({ type: 'famClick' });
    else famToggleContext();
    pd = null; dragging = false;
  });
  // preview mode in a normal browser: ?preview&char=panda&state=poisoned
  const q = new URLSearchParams(location.search);
  if (q.has('gallery')) {
    // side-by-side character lineup for design review
    document.body.dataset.state = q.get('state') || 'idle';
    document.body.innerHTML = Object.entries(CHARACTERS).map(([id, c]) => `
      <div data-fam-face="${document.body.dataset.famFace || 'open'}" class="char-${id}"
           style="display:inline-block;width:19%;text-align:center;margin-top:60px">
        <svg viewBox="0 0 120 120" style="width:150px;height:150px;overflow:visible">${c.body + faceMarkup(...c.face)}</svg>
        <div style="color:#e9e6f7;font-size:14px;margin-top:14px;font-family:Georgia,serif">${c.name}</div>
        <div style="color:#9d97b8;font-size:11px;margin-top:3px">${id}</div>
      </div>`).join('');
    document.body.style.background = 'linear-gradient(160deg,#191534,#201a44)';
    return;
  }
  if (q.has('preview')) {
    document.body.style.background = '#1a1534';
    if (q.get('char')) Fam.setCharacter(q.get('char'));
    if (q.get('state')) Fam.setState(q.get('state'));
    Fam.hud(true);
  }
});
</script>
